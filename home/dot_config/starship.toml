# starship.toml â€” prompt configuration
# Docs: https://starship.rs/config/

# Add a blank line between shell prompts
add_newline = true

# Left-side prompt configuration
format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$cmd_duration\
$status\
$memory_usage\
$time\
$line_break\
$character"""

# Remove right-side prompt
right_format = ""

[character]
success_symbol = "[â‌¯](bold green)"
error_symbol   = "[â‌¯](bold red)"

[directory]
truncation_length    = 4
truncate_to_repo     = true
style                = "bold white bg:blue"
format = " [î‚¶](blue)[$path]($style)[î‚´](blue) "
read_only            = " َ°Œ¾"
home_symbol          = "َ±‚µ ~"

[git_branch]
symbol = "ïگک "
style  = "bold white bg:purple"
format = "[î‚¶](purple)[$symbol$branch]($style)[î‚´](purple) "

[git_status]
style    = "bold white bg:red"
format = "([î‚¶](red)[$all_status$ahead_behind]($style)[î‚´](red) )"
ahead    = "â‡،${count}"
behind   = "â‡£${count}"
diverged = "â‡•â‡،${ahead_count}â‡£${behind_count}"
conflicted = "="
stashed    = "$"
modified   = "!"
staged     = "+"
renamed    = "آ»"
untracked  = "?"
deleted    = "âœک"

[cmd_duration]
min_time           = 2_000
format             = "َ±«؟ [$duration]($style) "
style              = "yellow"
show_milliseconds  = false

[status]
disabled = false
format = " [$symbol $status]($style)"
symbol = "َ°„±"
success_symbol = "" # Show nothing on success
not_found_symbol = "َ°چ‰"
sigint_symbol = "َ°ڑڈ"
style = "bold red"

[time]
disabled = false
format = " [$time]($style)"
time_format = "%R" # Hour:Minute Format
style = "dimmed white"

# ---------- Language modules (only shown when relevant) ----------
[python]
symbol = "َ°Œ  "
