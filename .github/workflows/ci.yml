name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-bundle:
    name: Shellcheck + Core Brewfile
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew cache
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/Homebrew
            /opt/homebrew
          key: ${{ runner.os }}-homebrew-${{ hashFiles('home/dot_Brewfile.*') }}
          restore-keys: |
            ${{ runner.os }}-homebrew-

      - name: Install Brewfile dependencies (Core)
        run: brew bundle --file=home/dot_Brewfile.core

      - name: Check Brewfile syntax (Home)
        run: brew bundle check --file=home/dot_Brewfile.home || true
        # '|| true' because some home apps might not be installable on CI runners (e.g. GUI apps)
        # but we want to at least verify the syntax/existence.

      - name: Validate configuration files (YAML/JSON/TOML)
        run: |
          # YAML Validation
          yamllint .serena/*.yml

          # TOML Validation using yq
          yq eval . home/dot_config/starship.toml > /dev/null
          yq eval . home/dot_config/atuin/config.toml > /dev/null
          yq eval . home/dot_config/yazi/yazi.toml > /dev/null

          # TOML Validation for chezmoi templates
          chezmoi execute-template < home/dot_codex/config.toml.tmpl | yq eval . > /dev/null

          # JSON Validation
          jq . home/dot_claude/dot_mcp.json > /dev/null
          jq . home/dot_gemini/settings.json > /dev/null

      - name: Validate Chezmoi templates
        run: |
          # Verify .tmpl files can be rendered correctly
          find . -name "*.tmpl" -exec sh -c 'chezmoi execute-template < "$1" > /dev/null' _ {} \;

      - name: Run shellcheck on scripts
        run: |
          shellcheck --severity=warning scripts/*.sh tests/*.sh tests/lib/*.sh home/dot_config/git/hooks/*

      - name: Run regression tests
        run: make test
