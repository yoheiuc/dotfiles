name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-bundle:
    name: Shellcheck + Core Brewfile
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update Homebrew
        run: brew update

      - name: Install core Brewfile dependencies
        run: brew bundle --file=home/dot_Brewfile.core

      - name: Run shellcheck on scripts
        run: |
          # shellcheck is installed via Brewfile
          shellcheck --severity=warning scripts/*.sh
