# starship.toml — prompt configuration
# Docs: https://starship.rs/config/

# Add a blank line between shell prompts
add_newline = true

# Left-side prompt configuration
format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$cmd_duration\
$line_break\
$character"""

# Right-side prompt configuration
right_format = """
$status\
$memory_usage\
$time"""

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"

[directory]
truncation_length    = 4
truncate_to_repo     = true
style                = "bold blue"
read_only            = " 󰌾"
home_symbol          = "󱂵 ~"

[git_branch]
symbol = " "
style  = "bold purple"

[git_status]
style    = "bold red"
ahead    = "⇡${count}"
behind   = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
conflicted = "="
stashed    = "$"
modified   = "!"
staged     = "+"
renamed    = "»"
untracked  = "?"
deleted    = "✘"

[cmd_duration]
min_time           = 2_000
format             = "󱫿 [$duration]($style) "
style              = "yellow"
show_milliseconds  = false

[status]
disabled = false
format = "[$symbol $status]($style) "
symbol = "󰄱"
success_symbol = "󰄲"
not_found_symbol = "󰍉"
sigint_symbol = "󰚏"

[time]
disabled = false
format = "[$time]($style)"
time_format = "%R" # Hour:Minute Format
style = "dimmed white"

# ---------- Language modules (only shown when relevant) ----------
[python]
symbol = "󰌠 "
style = "bold yellow"

[nodejs]
symbol = "󰎙 "
style = "bold green"

[rust]
symbol = "󱘗 "
style = "bold orange"

[memory_usage]
symbol = "󰍛 "
disabled = false
threshold = 75
style = "dimmed white"
